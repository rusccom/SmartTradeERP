openapi: 3.0.3
info:
  title: SmartERP API
  version: 1.0.0
servers:
  - url: /api
paths:
  /admin/auth/login:
    post:
      summary: Admin login
  /admin/tenants:
    get:
      summary: List tenants
  /admin/tenants/{id}:
    get:
      summary: Tenant details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
  /admin/stats:
    get:
      summary: Platform stats
  /client/auth/login:
    post:
      summary: Client login
  /client/auth/register:
    post:
      summary: Register tenant and owner
  /client/products:
    get:
      summary: List regular products with optional variants, stock and warehouses includes
      parameters:
        - in: query
          name: include
          schema:
            type: string
          example: variants,stock,warehouses
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: warehouse_id
          schema:
            type: string
        - in: query
          name: min_qty
          schema:
            type: string
        - in: query
          name: max_qty
          schema:
            type: string
        - in: query
          name: qty_state
          schema:
            type: string
            enum: [positive, negative, zero, nonzero]
    post:
      summary: Create product with default variant
  /client/products/{id}:
    get:
      summary: Product details
      parameters:
        - $ref: '#/components/parameters/PathID'
    put:
      summary: Update product
      parameters:
        - $ref: '#/components/parameters/PathID'
    delete:
      summary: Delete product when no inventory movements and bundle links exist
      parameters:
        - $ref: '#/components/parameters/PathID'
  /client/variants:
    get:
      summary: List variants
    post:
      summary: Create variant
  /client/variants/{id}:
    get:
      summary: Variant details
      parameters:
        - $ref: '#/components/parameters/PathID'
    put:
      summary: Update variant
      parameters:
        - $ref: '#/components/parameters/PathID'
    delete:
      summary: Delete variant when no inventory movements and bundle links exist
      parameters:
        - $ref: '#/components/parameters/PathID'
  /client/variants/{id}/stock:
    get:
      summary: Variant stock global and by warehouses
      parameters:
        - $ref: '#/components/parameters/PathID'
  /client/bundles:
    get:
      summary: List composite product variants
  /client/bundles/{id}:
    get:
      summary: Bundle details with components
      parameters:
        - $ref: '#/components/parameters/PathID'
  /client/bundles/{id}/components:
    get:
      summary: List bundle components
      parameters:
        - $ref: '#/components/parameters/PathID'
    put:
      summary: Replace bundle components
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [components]
              properties:
                components:
                  type: array
                  items:
                    $ref: '#/components/schemas/BundleComponent'
  /client/warehouses:
    get:
      summary: List warehouses
    post:
      summary: Create warehouse
  /client/warehouses/{id}:
    put:
      summary: Update warehouse
      parameters:
        - $ref: '#/components/parameters/PathID'
    delete:
      summary: Delete warehouse when no movements
      parameters:
        - $ref: '#/components/parameters/PathID'
  /client/documents:
    get:
      summary: List documents
    post:
      summary: Create draft document with generated number when omitted
  /client/documents/{id}:
    get:
      summary: Document card with projected line profit
      parameters:
        - $ref: '#/components/parameters/PathID'
    put:
      summary: Update draft or create a new posting revision for a posted document
      parameters:
        - $ref: '#/components/parameters/PathID'
    delete:
      summary: Delete draft document
      parameters:
        - $ref: '#/components/parameters/PathID'
  /client/documents/{id}/post:
    post:
      summary: Post document
      parameters:
        - $ref: '#/components/parameters/PathID'
  /client/documents/{id}/cancel:
    post:
      summary: Reverse active posting batch for a posted document
      parameters:
        - $ref: '#/components/parameters/PathID'
  /client/reports/profit:
    get:
      summary: Profit report from active cost projections
  /client/reports/stock:
    get:
      summary: Stock report from stock balance projections
  /client/reports/top-products:
    get:
      summary: Top products by profit
  /client/reports/movements:
    get:
      summary: Active variant inventory movements with cost results
components:
  parameters:
    PathID:
      in: path
      name: id
      required: true
      schema:
        type: string
  schemas:
    Envelope:
      type: object
      properties:
        data:
          nullable: true
        error:
          $ref: '#/components/schemas/ErrorBody'
        meta:
          $ref: '#/components/schemas/Meta'
    ErrorBody:
      type: object
      nullable: true
      properties:
        code:
          type: string
        message:
          type: string
        details:
          nullable: true
    Meta:
      type: object
      nullable: true
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    Bundle:
      type: object
      properties:
        product_id:
          type: string
        variant_id:
          type: string
        product_name:
          type: string
        variant_name:
          type: string
        sku_code:
          type: string
        unit:
          type: string
        price:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/BundleComponent'
    BundleComponent:
      type: object
      required: [component_variant_id, qty]
      properties:
        component_variant_id:
          type: string
        qty:
          type: string
        product_name:
          type: string
        variant_name:
          type: string
        unit:
          type: string
